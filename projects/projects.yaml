projects:
  - date: Mar 7, 2026
    name: Stang Hacks
    tagline: >-
      Won Best UI/UX out of 450+ participants with Ride2Rider, a smart school
      transportation coordination platform.
    description: >-
      At Stang Hacks, our team built Ride2Rider, a platform designed to reduce
      congestion during school drop-off and pick-up. We used the Google Maps API
      to help optimize routes and make transportation more efficient for students
      and parents.

      The app also includes chat and commenting features so riders can coordinate
      in real time. We focused heavily on making the interface clean and easy to
      use, which helped us win Best UI/UX out of over 450 participants.

      This project was a great experience in building something practical that
      solves a real-world problem while also focusing on design, usability, and
      real-world logistics.
    thumbnail: /thumbnails/placeholder.svg
    githubURL: https://github.com/ConnorSawaya/Ride2Rider
    videoURL: https://youtu.be/M6Smstte16U
    categories:
      - Hackathons
      - Programming

  - date: Mar 7, 2026
    name: Lancer Hacks
    tagline: >-
      Placed 2nd with GlobalBridge Connect, a platform helping people find
      essential local resources.
    description: >-
      At Lancer Hacks, we built GlobalBridge Connect and placed 2nd overall. The
      goal of the project was to help people in underserved communities find
      important resources like food, healthcare, education, and jobs.

      We created a website that brings this information into one place and makes
      it easy to search. The frontend was built with HTML, CSS, and JavaScript,
      and we used Python on the backend to handle data and search functionality.

      Most of the data on local organizations and services was entered manually
      to ensure accuracy and reliability. We also integrated Claude to speed up
      development in a few areas.

      Through this project, I learned a lot about building full-stack applications,
      organizing data effectively, and creating an interface that’s accessible and
      helpful for disadvantaged communities.
    thumbnail: /thumbnails/placeholder.svg
    websiteURL: https://devpost.com/software/global-bridge-connect
    categories:
      - Hackathons
      - Programming

  - date: Jan 16, 2026
    name: Divergent
    tagline: >-
      Placed 4th at a competitive hackathon hosted at the Microsoft SF office.
    description: >-
      Competed in the Divergent hackathon at the Microsoft San Francisco office,
      where our team placed 4th overall.

      We worked under tight time constraints to design and build a working
      prototype, focusing on both functionality and presentation. This project
      was a great experience in fast-paced development, teamwork, and pitching
      ideas effectively.
    thumbnail: /thumbnails/placeholder.svg
    categories:
