  - date: Dec 14, 2025
    name: BellHacks
    tagline: >-
      First hackathon project – built an AI-powered product health scanner.
    description: >-
      BellHacks was my first hackathon, hosted at my school, Bellarmine College
      Preparatory.

      Our team built Vita-Health, a project where users can scan a product
      barcode and get a health score along with information about the product.
      We used the Gemini API to analyze ingredients and generate simple,
      understandable insights.

      This project introduced me to hackathons and real-world development. I
      learned how to quickly design, build, and present a working idea while
      integrating an API and building a usable front-end interface.
    thumbnail: /thumbnails/placeholder.svg
    githubURL: https://github.com/ConnorSawaya/Vita-Health
    categories:
      - Hackathons
      - Programming
