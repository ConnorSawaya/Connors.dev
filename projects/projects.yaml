projects:
  - date: Mar 7, 2026
    name: Stang Hacks
    tagline: Best UI/UX (out of 450+ participants) – Ride2Rider
    description: >-
      Prize: Best UI/UX

      Ride2Rider helps parents save time by optimizing school drop-off and pick-up
      routes. Using Google Maps API, the app provides safe and efficient
      transportation for students. Our chat and comment features allow real-time
      coordination among students and parents, making rides more effective.

      This project won Best UI/UX out of 450+ participants. It was my experience
      designing a clean, practical, and user-friendly interface.

      GitHub: https://github.com/ConnorSawaya/Ride2Rider  
      Video demo: https://youtu.be/M6Smstte16U
